<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-header">College Login</div>
  
    <div class="tab">
      <button class="tablinks active" onclick="openTab(event, 'admin')">Admin Login</button>
      <button class="tablinks" onclick="openTab(event, 'student')">Student Login</button>
    </div>

    <div id="admin" class="tabcontent" style="display: block;">
      <form id="adminForm" onsubmit="return login('Admin')">
        <label>Username:</label>
        <input type="text" id="adminUser" required />
        <label>Password:</label>
        <input type="password" id="adminPass" required />
        <div class="btn-group">
          <button type="submit" class="login-btn">Login</button>
          <button type="button" class="exit-btn" onclick="exitApp()">Exit</button>
        </div>
      </form>
    </div>

    <div id="student" class="tabcontent">
      <form id="studentForm" onsubmit="return login('Student')">
        <label>Username:</label>
        <input type="text" id="studentUser" required />
        <label>Password:</label>
        <input type="password" id="studentPass" required />
        <div class="btn-group">
          <button type="submit" class="login-btn">Login</button>
          <button type="button" class="exit-btn" onclick="exitApp()">Exit</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
