<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Election Setup</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1976D2, #26A69A);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .setup-container {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 380px;
      padding: 20px;
      border: 2px solid #1976D2;
    }

    .header {
      background-color: #1976D2;
      color: white;
      font-weight: bold;
      font-size: 18px;
      text-align: center;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 5px;
    }

    input[type="text"] {
      width: 95%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #aaa;
    }

    .status-group {
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .status-group input {
      margin-left: 10px;
      margin-right: 5px;
    }

    .candidates-box {
      border: 1px solid #aaa;
      border-radius: 5px;
      padding: 10px;
      background-color: #f9f9f9;
      height: 120px;
      overflow-y: auto;
    }

    .candidate-item {
      margin-bottom: 5px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }

    button {
      width: 90px;
      padding: 8px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      color: #fff;
      transition: background-color 0.3s;
    }

    .save-btn {
      background-color: #1976D2;
    }

    .save-btn:hover {
      background-color: #0D47A1;
    }

    .cancel-btn {
      background-color: #B0BEC5;
      color: #000;
    }

    .cancel-btn:hover {
      background-color: #90A4AE;
    }
  </style>
</head>
<body>
  <div class="setup-container">
    <div class="header">Election Setup</div>

    <label for="electionName">Election Name:</label>
    <input type="text" id="electionName" placeholder="CR Election - AIML 2nd Year" />

    <label>Status:</label>
    <div class="status-group">
      <input type="radio" name="status" id="open" value="Open" checked /> <label for="open">Open</label>
      <input type="radio" name="status" id="closed" value="Closed" /> <label for="closed">Closed</label>
    </div>

    <label>Assign Candidates:</label>
    <div class="candidates-box">
      <div class="candidate-item"><input type="checkbox" checked /> Rajasekhar</div>
      <div class="candidate-item"><input type="checkbox" checked /> Rishi</div>
      <div class="candidate-item"><input type="checkbox" checked /> Tharn</div>
      <div class="candidate-item"><input type="checkbox" checked /> Kamal</div>
    </div>

    <div class="btn-group">
      <button class="save-btn" onclick="saveElection()">Save</button>
      <button class="cancel-btn" onclick="cancelElection()">Cancel</button>
    </div>
  </div>

  <script>
    function saveElection() {
      const name = document.getElementById("electionName").value;
      const status = document.querySelector('input[name="status"]:checked').value;
      const candidates = Array.from(
        document.querySelectorAll(".candidates-box input[type='checkbox']:checked")
      ).map((cb) => cb.parentElement.textContent.trim());

      if (!name) {
        alert("Please enter an election name.");
        return;
      }

      alert(
        `Election Saved!\n\nElection: ${name}\nStatus: ${status}\nCandidates: ${candidates.join(", ")}`
      );
    }

    function cancelElection() {
      if (confirm("Cancel election setup?")) {
        document.getElementById("electionName").value = "";
        document.querySelectorAll(".candidates-box input[type='checkbox']").forEach((cb) => (cb.checked = false));
        alert("Election setup canceled.");
      }
    }
  </script>
</body>
</html>
