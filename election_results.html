<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Election Results</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1976D2, #26A69A);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .results-container {
      background: #ffffff;
      width: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      padding: 20px;
      border: 2px solid #1976D2;
    }

    .results-header {
      background-color: #1976D2;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      padding: 10px;
      border-radius: 5px;
      margin: -20px -20px 20px -20px;
    }

    h3 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      text-align: center;
      padding: 8px;
    }

    th {
      background-color: #E3F2FD;
      color: #333;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .winner {
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      color: #000;
    }

    .winner span {
      color: #1976D2;
      font-weight: bold;
      font-size: 18px;
    }

    .trophy {
      width: 25px;
      vertical-align: middle;
      margin-left: 8px;
    }
  </style>
</head>

<body>
  <div class="results-container">
    <div class="results-header">Election Results</div>

    <h3>Election Results</h3>

    <table id="resultsTable">
      <thead>
        <tr>
          <th>Candidate Name</th>
          <th>Total Votes</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Rajasekhar</td><td>120</td></tr>
        <tr><td>Rishi</td><td>95</td></tr>
        <tr><td>Tharn</td><td>80</td></tr>
        <tr><td>Kamal</td><td>75</td></tr>
      </tbody>
    </table>

    <div class="winner">
      Winner: <span id="winnerName"></span>
      <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Trophy" class="trophy" />
    </div>
  </div>

  <script>
    function findWinner() {
      const rows = document.querySelectorAll("#resultsTable tbody tr");
      let topCandidate = "";
      let maxVotes = 0;

      rows.forEach((row) => {
        const name = row.cells[0].textContent;
        const votes = parseInt(row.cells[1].textContent);
        if (votes > maxVotes) {
          maxVotes = votes;
          topCandidate = name;
        }
      });

      document.getElementById("winnerName").textContent = topCandidate;
    }
    window.onload = findWinner;
  </script>
</body>
</html>
